name: Maven Build and Release

on:
  push:
    tags:
      - 'v*'  # 匹配 v1.0.0 这样的标签触发发布

permissions:
  contents: write  # 允许创建 Release 和上传文件

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 1.8
      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'  # 推荐使用 Temurin (Adoptium)
          cache: 'maven'  # 启用 Maven 缓存加速构建

      # 3. Maven 编译打包
      - name: Build with Maven
        run: mvn clean package -DskipTests -B -V

      # 4. 发布到 GitHub Releases
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/*.jar
          body: |
            ## 更新内容
            - 自动构建发布
            - 版本：${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
