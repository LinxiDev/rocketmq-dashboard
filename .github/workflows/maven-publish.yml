name: Maven Build and Release

on:
  push:
    tags:
      - 'v*'  # 匹配 v1.0.0 这样的标签触发发布
  workflow_dispatch:  # 添加手动触发
    inputs:
      version:
        description: '版本号 (可选，手动触发时覆盖日期版本)'
        required: false
        default: ''
      skip_tests:
        description: '是否跳过测试'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write  # 允许创建 Release 和上传文件

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以便获取 tag 信息

      # 2. 设置 JDK 1.8
      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      # 3. 生成版本号 (有tag用tag，无tag用日期)
      - name: Generate Version
        id: version
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/ ]]; then
            # 有 tag，使用 tag 名称
            VERSION="${{ github.ref_name }}"
            IS_TAG="true"
          else
            # 无 tag，使用日期格式
            if [[ -n "${{ inputs.version }}" ]]; then
              VERSION="${{ inputs.version }}"
            else
              VERSION="$(date +%Y-%m-%d)"
            fi
            IS_TAG="false"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_tag=${IS_TAG}" >> $GITHUB_OUTPUT
          echo "版本: ${VERSION}, 是否tag: ${IS_TAG}"

      # 4. Maven 编译打包
      - name: Build with Maven
        run: mvn clean package -DskipTests=${{ inputs.skip_tests || 'true' }} -B -V

      # 5. 上传构建产物为 Artifacts (所有触发方式都执行)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ steps.version.outputs.version }}
          path: target/*.jar
          retention-days: 30

      # 6. 发布到 GitHub Releases (有 tag 或手动触发时都执行)
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          files: |
            target/*.jar
          body: |
            ## 更新内容
            - 构建版本：${{ steps.version.outputs.version }}
            - 触发方式：${{ steps.version.outputs.is_tag == 'true' && '标签推送' || '手动触发' }}
            - 构建时间：${{ github.event.head_commit.timestamp || github.run_started_at }}
          draft: false
          prerelease: ${{ steps.version.outputs.is_tag == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
