name: Maven Build and Release

on:
  push:
    tags:
      - 'v*'  # 匹配 v1.0.0 这样的标签触发发布
  workflow_dispatch:  # 添加手动触发
    inputs:
      version:
        description: '版本号 (可选，用于手动触发时指定)'
        required: false
        default: ''
      skip_tests:
        description: '是否跳过测试'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write  # 允许创建 Release 和上传文件

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以便获取 tag 信息

      # 2. 设置 JDK 1.8
      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Maven 编译打包
      - name: Build with Maven
        run: mvn clean package -DskipTests=${{ inputs.skip_tests || 'true' }} -B -V

      # 4. 上传构建产物为 Artifacts (所有触发方式都执行)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: target/*.jar
          retention-days: 30

      # 5. 发布到 GitHub Releases (仅当有 tag 时执行)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')  # 只在 tag 推送时执行
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/*.jar
          body: |
            ## 更新内容
            - 自动构建发布
            - 版本：${{ github.ref_name }}
            - 触发方式：标签推送
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
